name: Deploy SGES to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: sges-sena

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restaurar paquetes NuGet
        run: nuget restore SGES.Web/SGES.Web/SGES.Web.sln

      - name: Compilar y publicar con MSBuild
        run: |
          msbuild SGES.Web/SGES.Web/SGES.Web.sln `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="D:\a\SGESWeb\SGESWeb\publish" `
            /p:SkipInvalidConfigurations=true

      - name: Diagnosticar rutas
        run: |
          Write-Host "=== github.workspace ==="
          Write-Host "${{ github.workspace }}"
          Write-Host "=== Contenido de D:\a\SGESWeb\SGESWeb\ ==="
          Get-ChildItem "D:\a\SGESWeb\SGESWeb\" | Select-Object Name, PSIsContainer
          Write-Host "=== Buscar carpeta publish en D:\a\ ==="
          Get-ChildItem "D:\a\" -Recurse -Directory -Filter "publish" -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== Buscar bin\Release en el proyecto ==="
          Get-ChildItem "D:\a\SGESWeb\SGESWeb\SGES.Web\SGES.Web\bin" -ErrorAction SilentlyContinue | Select-Object Name
