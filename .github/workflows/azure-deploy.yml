name: Deploy SGES to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: sges-sena

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restaurar paquetes NuGet
        run: nuget restore SGES.Web/SGES.Web/SGES.Web.sln

      - name: Compilar con MSBuild
        run: |
          msbuild SGES.Web/SGES.Web/SGES.Web.sln `
            /p:Configuration=Release `
            /p:SkipInvalidConfigurations=true

      - name: Empaquetar para despliegue
        run: |
          $src = "D:\a\SGESWeb\SGESWeb\SGES.Web\SGES.Web"
          $dest = "D:\a\SGESWeb\SGESWeb\publish"
          New-Item -ItemType Directory -Force -Path $dest

          Copy-Item "$src\bin"     "$dest\bin"     -Recurse -Force
          Copy-Item "$src\Content" "$dest\Content" -Recurse -Force
          Copy-Item "$src\Scripts" "$dest\Scripts" -Recurse -Force
          Copy-Item "$src\Views"   "$dest\Views"   -Recurse -Force
          Copy-Item "$src\Reports" "$dest\Reports" -Recurse -Force
          Copy-Item "$src\Global.asax" "$dest\Global.asax" -Force
          Copy-Item "$src\favicon.ico" "$dest\favicon.ico" -Force -ErrorAction SilentlyContinue

          # Web.config: usar Release transform
          $webConfigSrc = "$src\obj\Release\TransformWebConfig\transformed\Web.config"
          if (Test-Path $webConfigSrc) {
            Write-Host "Usando Web.config transformado de Release"
            Copy-Item $webConfigSrc "$dest\Web.config" -Force
          } else {
            Write-Host "Usando Web.config original"
            Copy-Item "$src\Web.config" "$dest\Web.config" -Force
          }

          Write-Host "=== Verificando Web.config ==="
          $content = Get-Content "$dest\Web.config" -Raw
          Write-Host "Tamaño: $($content.Length) caracteres"
          if ($content -match "SGESConnection") {
            Write-Host "Connection string encontrada OK"
          } else {
            Write-Error "Web.config no contiene SGESConnection"
            exit 1
          }

      - name: Desplegar en Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'D:\a\SGESWeb\SGESWeb\publish'
