name: Deploy SGES to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: sges-sena

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restaurar paquetes NuGet
        run: nuget restore SGES.Web/SGES.Web/SGES.Web.sln

      - name: Compilar con MSBuild
        run: |
          msbuild SGES.Web/SGES.Web/SGES.Web.sln `
            /p:Configuration=Release `
            /p:SkipInvalidConfigurations=true

      - name: Empaquetar para despliegue
        run: |
          $src = "D:\a\SGESWeb\SGESWeb\SGES.Web\SGES.Web"
          $dest = "D:\a\SGESWeb\SGESWeb\publish"
          New-Item -ItemType Directory -Force -Path $dest

          Copy-Item "$src\bin"     "$dest\bin"     -Recurse -Force
          Copy-Item "$src\Content" "$dest\Content" -Recurse -Force
          Copy-Item "$src\Scripts" "$dest\Scripts" -Recurse -Force
          Copy-Item "$src\Views"   "$dest\Views"   -Recurse -Force
          Copy-Item "$src\Reports" "$dest\Reports" -Recurse -Force
          Copy-Item "$src\Global.asax" "$dest\Global.asax" -Force
          Copy-Item "$src\favicon.ico" "$dest\favicon.ico" -Force -ErrorAction SilentlyContinue
          Copy-Item "$src\Web.config"  "$dest\Web.config"  -Force

          Write-Host "Tamaño Web.config: $((Get-Item "$dest\Web.config").Length) bytes"

      - name: Desplegar en Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: 'D:\a\SGESWeb\SGESWeb\publish'

      - name: Forzar Web.config correcto via Kudu API
        run: |
          $webConfigContent = Get-Content "D:\a\SGESWeb\SGESWeb\SGES.Web\SGES.Web\Web.config" -Raw
          Write-Host "Subiendo Web.config ($($webConfigContent.Length) chars) via Kudu..."

          $publishProfile = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}"))

          # Extraer credenciales del publish profile
          $xml = [xml]$publishProfile
          $profile = $xml.publishData.publishProfile | Where-Object { $_.publishMethod -eq "MSDeploy" } | Select-Object -First 1
          $username = $profile.userName
          $password = $profile.userPWD
          $publishUrl = $profile.publishUrl

          $kuduUrl = "https://$publishUrl/api/vfs/site/wwwroot/Web.config"
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${username}:${password}"))
          $headers = @{
            Authorization = "Basic $base64Auth"
            "If-Match" = "*"
          }

          $bytes = [System.Text.Encoding]::UTF8.GetBytes($webConfigContent)
          Invoke-RestMethod -Uri $kuduUrl -Method Put -Headers $headers -Body $bytes -ContentType "application/octet-stream"
          Write-Host "Web.config subido correctamente"
