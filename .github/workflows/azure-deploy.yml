name: Deploy SGES Azure

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2


    - name: Restore NuGet
      run: nuget restore SGES.Web/SGES.Web/SGES.Web.sln


    - name: Publish
      run: |
        msbuild SGES.Web/SGES.Web/SGES.Web.csproj ^
        /p:Configuration=Release ^
        /p:DeployOnBuild=true ^
        /p:WebPublishMethod=FileSystem ^
        /p:PublishUrl=./publish


    - name: Deploy Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: sges-sena
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
