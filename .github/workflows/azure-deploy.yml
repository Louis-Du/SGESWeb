name: Deploy SGES Azure

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2


    - name: Restore packages
      run: nuget restore SGES.Web.sln


    - name: Build
      run: msbuild SGES.Web.sln /p:Configuration=Release


    - name: Deploy Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: sges-sena
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: SGES.Web/bin/Release
