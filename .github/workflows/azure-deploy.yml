name: Deploy SGES to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: sges-sena

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restaurar paquetes NuGet
        run: nuget restore SGES.Web/SGES.Web/SGES.Web.sln

      - name: Compilar y publicar con MSBuild
        run: |
          msbuild SGES.Web/SGES.Web/SGES.Web.sln `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="${{ github.workspace }}\publish" `
            /p:SkipInvalidConfigurations=true

      - name: Desplegar en Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '${{ github.workspace }}\publish'
